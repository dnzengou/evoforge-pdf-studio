version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      pdf:
        patterns:
          - "pdf-lib"
          - "pdfjs-dist"
      lint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
      types:
        patterns:
          - "@types/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
